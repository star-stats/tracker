name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/sync-wiki.yml"

permissions:
  contents: read

concurrency:
  group: sync-wiki
  cancel-in-progress: true

jobs:
  sync:
    name: Publish docs/wiki to the GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Sync docs/wiki to wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          COMMIT_NAME: ${{ github.event.head_commit.author.name }}
          COMMIT_EMAIL: ${{ github.event.head_commit.author.email }}
        run: |
          WIKI_DIR="$RUNNER_TEMP/wiki"
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" "$WIKI_DIR"

          rsync -a --delete --exclude='.git' docs/wiki/ "$WIKI_DIR/"

          cd "$WIKI_DIR"
          git config user.name "Ferran Buireu"
          git config user.email "fbuireu@gmail.com"
          git add -A

          if git diff --staged --quiet; then
            echo "Wiki already up to date — nothing to publish."
            exit 0
          fi

          git commit -m "docs: sync wiki from ${GITHUB_SHA}"
          git push origin HEAD
